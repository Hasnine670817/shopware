<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopware</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 999999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        opacity: 1;
        transition: opacity 0.45s ease;
      }
      #app-splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 30px;
        font-weight: 700;
        color: #202734;
        letter-spacing: -0.5px;
        user-select: none;
      }
      .splash-logo span {
        color: #f08a2f;
      }
      .splash-track {
        width: 140px;
        height: 3px;
        background: #f0f0f0;
        border-radius: 999px;
        overflow: hidden;
      }
      .splash-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #f08a2f, #ffb347);
        animation: splash-slide 1.2s ease-in-out infinite;
      }
      @keyframes splash-slide {
        0%   { width: 0%;   margin-left: 0%;    }
        40%  { width: 70%;  margin-left: 0%;    }
        60%  { width: 70%;  margin-left: 30%;   }
        100% { width: 0%;   margin-left: 140%;  }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen (visible before React loads) -->
    <div id="app-splash">
      <div class="splash-logo">SHOP<span>WARE</span></div>
      <div class="splash-track">
        <div class="splash-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
